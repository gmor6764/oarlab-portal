<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OarLab — Signing in…</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { background:#0d0f0e; color:#f5f0e8; font-family:monospace;
         display:flex; align-items:center; justify-content:center;
         min-height:100vh; text-align:center; }
  .ring { width:32px; height:32px; border:3px solid rgba(200,184,154,0.2);
           border-top-color:#e8a838; border-radius:50%;
           animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to { transform:rotate(360deg); } }
  p { font-size:11px; letter-spacing:0.15em; text-transform:uppercase;
       color:#7a8c80; }
</style>
</head>
<body>
<div>
  <div class="ring"></div>
  <p>Signing you in…</p>
</div>
<script>
const { createClient } = supabase;
const sb = createClient('https://kthlqyjahjrkptxndxpy.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0aGxxeWphaGpya3B0eG5keHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDE5MzAsImV4cCI6MjA5MTg3NzkzMH0.1Oi2CTIrDMxDTNsBOBqIrxSjoZjGjOxEpB4HvBxrJOw', {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

async function handleCallback() {
  // detectSessionInUrl:true means Supabase auto-exchanges the token
  const { data: { session }, error } = await sb.auth.getSession();
  if (session) {
    window.location.replace('/');
  } else {
    // Wait briefly for the token exchange to complete
    sb.auth.onAuthStateChange((event, session) => {
      if (session) window.location.replace('/');
    });
    // Fallback after 5 seconds
    setTimeout(() => window.location.replace('/'), 5000);
  }
}
handleCallback();
</script>
</body>
</html>
